<!-- Scripts for MathJax-->

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script type="text/javascript" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"> </script>

<script>
MathJax = {
  tex: {
    inlineMath: [["$", "$"]],
    displayMath: [
      ["$$", "$$"],
      ["\[\[", "\]\]"],
    ],
    tags : 'ams',
    tagformat: {
      tag:    (tag) => '[' + tag + ']'
    }
  },
  svg: {
    fontCache: "global",
  },
};
</script>
